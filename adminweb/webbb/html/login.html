<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập Admin - Việt Á Food</title>
    <link rel="stylesheet" href="../css/admin-style.css" />
  </head>
  <body class="admin-login-body">
    <div class="admin-login-container">
      <div class="admin-login-box">
        <div class="admin-login-header">
          <img src="../img/logo.png" alt="Logo" class="admin-logo" />
          <h1>Đăng nhập Admin</h1>
          <p>Hệ thống quản trị Việt Á Food</p>
        </div>

        <form id="adminLoginForm" class="admin-login-form">
          <div class="form-group">
            <label for="adminUsername">Tên đăng nhập:</label>
            <input
              type="text"
              id="adminUsername"
              name="username"
              required
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label for="adminPassword">Mật khẩu:</label>
            <input
              type="password"
              id="adminPassword"
              name="password"
              required
              autocomplete="current-password"
            />
          </div>

          <div
            id="loginError"
            class="error-message"
            style="display: none"
          ></div>

          <button type="submit" class="admin-login-btn">Đăng nhập</button>
        </form>

        <div class="admin-login-footer">
          <p>Lưu ý: Trang này dành riêng cho quản trị viên</p>
          <a href="../users/trangchu.html">← Quay về trang chủ</a>
        </div>
      </div>
    </div>

    <script src="admin-script.js"></script>
  </body>
</html>
