<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ Hàng - Cửa Hàng Laptop</title>

    <!-- Link tới file CSS -->
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header>
      <a href="products.html" class="home-logo">
        <img src="../img/logo.png" alt="logo" />
      </a>
      🛒 Giỏ Hàng Của Bạn
    </header>

    <table>
      <tr>
        <th>Sản Phẩm</th>
        <th>Đơn Giá</th>
        <th>Số Lượng</th>
        <th>Số Tiền</th>
        <th>Thao Tác</th>
      </tr>

      <tr>
        <td>
          <img src="../img/LaptopGaming/gm1.webp" /><br />
          Laptop Dell Inspiron 15
        </td>
        <td>18.000.000₫</td>
        <td class="quantity"><input type="number" value="1" min="1" /></td>
        <td>18.000.000₫</td>
        <td><button class="delete-btn">Xóa</button></td>
      </tr>

      <tr>
        <td>
          <img src="../img/sp2.jpg" /><br />
          Laptop Asus Vivobook X
        </td>
        <td>16.500.000₫</td>
        <td class="quantity"><input type="number" value="1" min="1" /></td>
        <td>16.500.000₫</td>
        <td><button class="delete-btn">Xóa</button></td>
      </tr>

      <tr>
        <td>
          <img src="../img/sp3.jpg" /><br />
          Laptop HP Pavilion 14
        </td>
        <td>15.200.000₫</td>
        <td class="quantity"><input type="number" value="1" min="1" /></td>
        <td>15.200.000₫</td>
        <td><button class="delete-btn">Xóa</button></td>
      </tr>

      <tr>
        <td>
          <img src="../img/sp4.jpg" /><br />
          Laptop Lenovo ThinkPad E14
        </td>
        <td>19.800.000₫</td>
        <td class="quantity"><input type="number" value="1" min="1" /></td>
        <td>19.800.000₫</td>
        <td><button class="delete-btn">Xóa</button></td>
      </tr>
    </table>

    <div class="total">Tổng cộng: <span>69.500.000₫</span></div>

    <div class="checkout">
      <button class="back-btn" onclick="window.location.href = 'products.html'">
        ← Quay về trang chủ
      </button>

      <button onclick="window.location.href = 'dathang.html'">
        Tiến hành đặt hàng
      </button>
    </div>
  </body>
</html>
