<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chỉnh sửa hồ sơ - MUIT</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f5f6fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* CARD */

      .edit-container {
        width: 450px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        padding: 30px;
      }

      /* HEADER */

      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .logo img {
        width: 45px;
      }

      .logo span {
        font-size: 22px;
        font-weight: bold;
        color: #e60023;
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      /* FORM */

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        color: #555;
      }

      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
      }

      input:focus {
        border-color: #e60023;
        outline: none;
      }

      /* BUTTONS */

      .buttons {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }

      .save-btn {
        background: #e60023;
        color: white;
      }

      .save-btn:hover {
        background: #c4001d;
      }

      .cancel-btn {
        background: #eee;
      }

      .cancel-btn:hover {
        background: #ddd;
      }

      /* MESSAGE */

      .msg {
        margin-top: 15px;
        text-align: center;
        font-weight: bold;
        color: green;
      }
    </style>
  </head>

  <body>
    <div class="edit-container">
      <div class="logo">
        <img src="../img/logo.png" />
        <span>MUIT STORE</span>
      </div>

      <h2>Chỉnh sửa thông tin cá nhân</h2>

      <form id="editForm">
        <div class="form-group">
          <label>Họ</label>
          <input type="text" value="Trần" required />
        </div>

        <div class="form-group">
          <label>Tên</label>
          <input type="text" value="Tấn Phát" required />
        </div>

        <div class="form-group">
          <label>Số điện thoại</label>
          <input type="text" value="0123456789" required />
        </div>

        <div class="form-group">
          <label>Địa chỉ</label>
          <input type="text" value="TP Hồ Chí Minh" required />
        </div>

        <div class="buttons">
          <button type="submit" class="save-btn">Lưu thay đổi</button>

          <button
            type="button"
            class="cancel-btn"
            onclick="window.location = 'profile.html'"
          >
            Hủy
          </button>
        </div>
      </form>

      <p class="msg" id="msg"></p>
    </div>

    <script>
      document
        .getElementById("editForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          document.getElementById("msg").textContent =
            "Cập nhật thành công! Đang quay về hồ sơ...";

          setTimeout(function () {
            window.location.href = "profile.html";
          }, 1500);
        });
    </script>
  </body>
</html>
