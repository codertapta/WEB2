<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thay đổi địa chỉ nhận hàng</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #fff;
        margin: 0;
        padding: 0;
        color: #333;
      }
      header {
        background-color: #d50000;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
      }
      .container {
        width: 80%;
        max-width: 800px;
        margin: 40px auto;
        background: #fff;
        border: 1px solid #f0f0f0;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(213, 0, 0, 0.2);
        padding: 30px;
      }
      h2 {
        color: #d50000;
        margin-bottom: 20px;
        border-bottom: 2px solid #d50000;
        padding-bottom: 10px;
      }
      label {
        font-weight: bold;
        color: #444;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        margin: 8px 0 16px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
      }
      button {
        background-color: #d50000;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background-color: #b00000;
      }
      .btn-cancel {
        background-color: #888;
        margin-left: 10px;
      }
      .btn-cancel:hover {
        background-color: #666;
      }
    </style>
  </head>
  <body>
    <header>Thay đổi địa chỉ nhận hàng</header>

    <div class="container">
      <h2>Thông tin nhận hàng mới</h2>

      <form action="#">
        <label for="hoten">Họ và tên:</label>
        <input
          type="text"
          id="hoten"
          name="hoten"
          placeholder="Nhập họ và tên của bạn"
          required
        />

        <label for="sdt">Số điện thoại:</label>
        <input type="tel" id="sdt" name="sdt" placeholder="+84 ..." required />

        <label for="diachi">Địa chỉ:</label>
        <textarea
          id="diachi"
          name="diachi"
          rows="3"
          placeholder="Nhập số nhà, tên đường..."
          required
        ></textarea>

        <label for="phuong">Phường / Xã:</label>
        <input
          type="text"
          id="phuong"
          name="phuong"
          placeholder="Nhập phường hoặc xã"
          required
        />

        <label for="quan">Quận / Huyện:</label>
        <input
          type="text"
          id="quan"
          name="quan"
          placeholder="Nhập quận hoặc huyện"
          required
        />

        <label for="tp">Tỉnh / Thành phố:</label>
        <select id="tp" name="tp" required>
          <option value="">-- Chọn tỉnh / thành phố --</option>
          <option>TP. Hồ Chí Minh</option>
          <option>Hà Nội</option>
          <option>Đà Nẵng</option>
          <option>Cần Thơ</option>
          <option>Khác</option>
        </select>

        <!-- Nút Lưu và Hủy -->
        <div style="text-align: center">
          <button
            type="button"
            onclick="alert('Lưu thành công!'); window.location.href='dathang.html';"
            style="
              background-color: #d50000;
              color: white;
              border: none;
              padding: 12px 20px;
              border-radius: 8px;
              font-size: 16px;
              cursor: pointer;
            "
          >
            Lưu thay đổi
          </button>

          <button
            type="button"
            class="btn-cancel"
            onclick="window.location.href='dathang.html'"
            style="
              background-color: #888;
              color: white;
              border: none;
              padding: 12px 20px;
              border-radius: 8px;
              font-size: 16px;
              cursor: pointer;
              margin-left: 10px;
            "
          >
            Hủy
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
